<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BFHL — Node Hierarchy Explorer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d1117;
      --surface:   #161b22;
      --border:    #30363d;
      --text:      #e6edf3;
      --muted:     #8b949e;
      --accent:    #58a6ff;
      --purple:    #a371f7;
      --green:     #3fb950;
      --red:       #f85149;
      --orange:    #d29922;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 15px;
      line-height: 1.6;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 18px 32px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    header .logo {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, var(--accent), var(--purple));
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    header h1 { font-size: 1.15rem; font-weight: 600; }
    header span { font-size: 0.82rem; color: var(--muted); margin-left: 2px; }

    .container { max-width: 860px; margin: 36px auto; padding: 0 20px; }

    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 24px;
      margin-bottom: 24px;
    }

    .panel-title {
      font-size: 0.78rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--muted);
      margin-bottom: 14px;
    }

    textarea {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 0.9rem;
      font-family: 'Cascadia Code', 'Fira Code', monospace;
      padding: 12px 14px;
      resize: vertical;
      min-height: 110px;
      outline: none;
      transition: border-color .15s;
    }
    textarea:focus { border-color: var(--accent); }

    .hint { font-size: 0.78rem; color: var(--muted); margin-top: 8px; }

    .actions { display: flex; align-items: center; gap: 12px; margin-top: 14px; }

    button {
      background: var(--accent);
      color: #0d1117;
      border: none;
      padding: 9px 24px;
      border-radius: 7px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .15s;
    }
    button:hover { opacity: .85; }
    button:disabled { opacity: .45; cursor: not-allowed; }

    .clear-btn {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
      padding: 9px 18px;
      font-weight: 500;
    }

    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid #0d111780;
      border-top-color: #0d1117;
      border-radius: 50%;
      animation: spin .55s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-box {
      background: #1a0505;
      border: 1px solid var(--red);
      color: #ff7b72;
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 0.88rem;
      margin-top: 14px;
    }

    /* ── results ── */
    .meta-row {
      display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 18px;
    }
    .meta-chip {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 5px 14px;
      font-size: 0.82rem;
      color: var(--muted);
    }
    .meta-chip b { color: var(--text); }

    .stat-row {
      display: flex; flex-wrap: wrap; gap: 12px;
    }
    .stat {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 20px;
      text-align: center;
      flex: 1;
      min-width: 110px;
    }
    .stat .val { font-size: 1.6rem; font-weight: 700; color: var(--accent); }
    .stat .lbl { font-size: 0.75rem; color: var(--muted); margin-top: 2px; }

    .hier-card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 10px;
    }
    .hier-header {
      display: flex; align-items: center; gap: 10px; margin-bottom: 10px;
    }
    .root-name {
      font-size: 1rem;
      font-weight: 700;
      color: var(--accent);
      font-family: monospace;
    }
    .badge {
      font-size: 0.72rem;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 12px;
    }
    .badge-tree   { background: #0d2b0d; color: var(--green); border: 1px solid #1f4d1f; }
    .badge-cycle  { background: #2b1010; color: var(--red);   border: 1px solid #4d1f1f; }
    .badge-depth  { background: #0b1c2e; color: var(--accent); border: 1px solid #1a3a5e; }

    .tree-vis { font-family: monospace; font-size: 0.82rem; color: #8b949e; line-height: 1.5; padding: 8px 0 0 4px; }
    .tree-node { color: var(--text); }

    .pills { display: flex; flex-wrap: wrap; gap: 8px; }
    .pill {
      font-size: 0.8rem;
      font-family: monospace;
      padding: 4px 12px;
      border-radius: 5px;
    }
    .pill-invalid { background: #1a0505; color: #ff7b72; border: 1px solid #4d1010; }
    .pill-dup     { background: #1a1205; color: #e3b341; border: 1px solid #4d3610; }

    .section-sep { border: none; border-top: 1px solid var(--border); margin: 6px 0 16px; }
  </style>
</head>
<body>

<header>
  <div class="logo">🌿</div>
  <div>
    <h1>BFHL Node Hierarchy Explorer <span>— Chitkara Round 1</span></h1>
  </div>
</header>

<div class="container">

  <div class="panel">
    <div class="panel-title">Input</div>
    <textarea id="inp" placeholder="A->B, A->C, B->D, C->E, E->F&#10;X->Y, Y->Z, Z->X&#10;P->Q, Q->R&#10;hello, 1->2, A->"></textarea>
    <div class="hint">Enter edges separated by commas or new lines. Format: X→Y (single uppercase letters).</div>
    <div class="actions">
      <button id="btn" onclick="submitData()">Analyse</button>
      <button class="clear-btn" onclick="clearAll()">Clear</button>
    </div>
    <div id="err" class="error-box" style="display:none"></div>
  </div>

  <div id="out"></div>

</div>

<script>
  // switch between local dev and deployed
  const API = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
    ? 'http://localhost:3000/bfhl'
    : 'https://bajaj-2310992510.onrender.com/bfhl';

  async function submitData() {
    const raw = document.getElementById('inp').value.trim();
    if (!raw) { showErr('Please enter some edges first.'); return; }

    const data = raw.split(/[\n,]+/).map(s => s.trim()).filter(Boolean);

    const btn = document.getElementById('btn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Processing…';
    document.getElementById('err').style.display = 'none';
    document.getElementById('out').innerHTML = '';

    try {
      const resp = await fetch(API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ data })
      });
      if (!resp.ok) {
        const msg = await resp.text();
        throw new Error(`Server returned ${resp.status}: ${msg}`);
      }
      render(await resp.json());
    } catch (e) {
      showErr(e.message);
    } finally {
      btn.disabled = false;
      btn.textContent = 'Analyse';
    }
  }

  function clearAll() {
    document.getElementById('inp').value = '';
    document.getElementById('out').innerHTML = '';
    document.getElementById('err').style.display = 'none';
  }

  function showErr(msg) {
    const el = document.getElementById('err');
    el.textContent = '⚠  ' + msg;
    el.style.display = 'block';
  }

  function render(d) {
    const s = d.summary;
    let html = '';

    // identity + summary
    html += `<div class="panel">
      <div class="panel-title">Identity</div>
      <div class="meta-row">
        <div class="meta-chip">User ID: <b>${d.user_id}</b></div>
        <div class="meta-chip">Email: <b>${d.email_id}</b></div>
        <div class="meta-chip">Roll No: <b>${d.college_roll_number}</b></div>
      </div>
      <hr class="section-sep">
      <div class="panel-title">Summary</div>
      <div class="stat-row">
        <div class="stat"><div class="val">${s.total_trees}</div><div class="lbl">Trees</div></div>
        <div class="stat"><div class="val">${s.total_cycles}</div><div class="lbl">Cycles</div></div>
        <div class="stat"><div class="val">${s.largest_tree_root ?? '—'}</div><div class="lbl">Largest Root</div></div>
      </div>
    </div>`;

    // hierarchies
    if (d.hierarchies.length > 0) {
      html += `<div class="panel"><div class="panel-title">Hierarchies</div>`;
      for (const h of d.hierarchies) {
        const typeBadge = h.has_cycle
          ? `<span class="badge badge-cycle">cycle</span>`
          : `<span class="badge badge-tree">tree</span>`;
        const depthBadge = !h.has_cycle
          ? `<span class="badge badge-depth">depth ${h.depth}</span>`
          : '';
        html += `<div class="hier-card">
          <div class="hier-header">
            <span class="root-name">${h.root}</span>
            ${typeBadge}${depthBadge}
          </div>
          ${h.has_cycle
            ? `<div style="color:var(--muted);font-size:.85rem">Cyclic group — no tree structure available.</div>`
            : `<div class="tree-vis">${renderTreeLines(h.root, h.tree[h.root] || h.tree, '')}</div>`
          }
        </div>`;
      }
      html += `</div>`;
    }

    // invalid entries
    if (d.invalid_entries.length > 0) {
      html += `<div class="panel">
        <div class="panel-title">Invalid Entries (${d.invalid_entries.length})</div>
        <div class="pills">
          ${d.invalid_entries.map(e => `<span class="pill pill-invalid">${escHtml(String(e))}</span>`).join('')}
        </div>
      </div>`;
    }

    // duplicates
    if (d.duplicate_edges.length > 0) {
      html += `<div class="panel">
        <div class="panel-title">Duplicate Edges (${d.duplicate_edges.length})</div>
        <div class="pills">
          ${d.duplicate_edges.map(e => `<span class="pill pill-dup">${escHtml(e)}</span>`).join('')}
        </div>
      </div>`;
    }

    document.getElementById('out').innerHTML = html;
  }

  function renderTreeLines(node, subtree, prefix) {
    const keys = Object.keys(subtree || {});
    let out = `<span class="tree-node">${node}</span>\n`;
    keys.forEach((child, i) => {
      const last     = i === keys.length - 1;
      const branch   = last ? '└── ' : '├── ';
      const childPfx = last ? '    ' : '│   ';
      out += prefix + branch + renderTreeLines(child, subtree[child], prefix + childPfx);
    });
    return out;
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // Ctrl+Enter shortcut
  document.getElementById('inp').addEventListener('keydown', e => {
    if (e.ctrlKey && e.key === 'Enter') submitData();
  });
</script>
</body>
</html>
